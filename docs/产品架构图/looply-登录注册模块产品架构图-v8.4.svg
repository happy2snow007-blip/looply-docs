<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 700" font-family="'PingFang SC','Microsoft YaHei','Helvetica Neue',Arial,sans-serif">
  <!--
  @structured-data: yaml
  module: 登录注册模块
  version: v8.4
  date: 2026-03
  scope: 外部用户（C端 + B端商家），不含内部运营

  layers:
    - name: 用户层
      groups:
        - name: C端用户（买家 + 卖家）
          channels: [App, H5, Web]
        - name: B端商家
          channels: [商家后台（PC）]

    - name: 核心能力
      sublayers:
        - name: 业务能力
          modules:
            - name: 注册
              items:
                - 手机号注册
                - 邮箱注册
                - Google 快捷注册
                - Apple 快捷注册
                - Facebook 快捷注册

            - name: 登录
              items:
                - 账号密码登录（邮箱/手机号）
                - 验证码登录（手机号/邮箱）
                - 三方账号登录（OAuth）
                - Passkey 登录（生物识别）
                - 找回密码（邮箱/手机重置）

            - name: 账号安全与合规
              items:
                - 风险认证 MFA
                - 密码修改
                - 隐私协议与 Cookie 授权
                - 数据合规（GDPR）

            - name: 账号管理
              items:
                - 用户信息管理
                - 三方账号绑定/解绑
                - 设备管理与远程下线
                - 账号注销

        - name: 技术能力
          modules:
            - name: 身份认证
              items:
                - 会话与 Token 管理
                - 多端登录策略
                - 用户数据分区（按国家/地区）
                - 密码加密存储
                - OAuth 协议对接
                - Passkey/FIDO2 对接
                - 多国手机号（区号适配）

            - name: 安全风控
              items:
                - 异常登录检测
                - 暴力破解拦截
                - 设备指纹
                - 人机验证 · IP 风控

    - name: 外围系统
      groups:
        - name: 依赖的平台能力
          items:
            - 验证码服务
            - 消息推送（SMS / 邮件）
            - 多语言 · 多时区
        - name: 三方外部系统
          items:
            - OAuth
            - SMS 服务商
            - 邮件服务商
  -->
  <defs>
    <filter id="s" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="1140" height="700" fill="#F9FAFB" rx="12"/>

  <!-- 标题栏 -->
