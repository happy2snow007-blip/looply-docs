  <rect x="0" y="32" width="1140" height="24" fill="#1E1F2E"/>
  <text x="570" y="34" text-anchor="middle" fill="#fff" font-size="20" font-weight="600">looply · 登录注册模块产品架构图</text>
  <text x="1100" y="34" text-anchor="end" fill="rgba(255,255,255,0.6)" font-size="11">v8.4 · 2026.03</text>

  <!-- ==================== 第一层：用户层 ==================== -->
