<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Looply PRD - 登录注册功能说明文档</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f7fa;
    color: #333;
    line-height: 1.8;
  }
  .topbar {
    position: sticky; top: 0; z-index: 20;
    background: #fff; border-bottom: 1px solid #e5e7eb;
    padding: 12px 24px;
    display: flex; align-items: center; gap: 12px;
  }
  .topbar a {
    color: #6366f1; text-decoration: none; font-size: 14px; font-weight: 500;
  }
  .topbar a:hover { text-decoration: underline; }
  .topbar .title { font-size: 15px; font-weight: 600; color: #1e1e2e; }
  .layout {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    gap: 0;
  }
  /* 侧边目录 */
  .toc {
    position: sticky;
    top: 49px;
    width: 260px;
    height: calc(100vh - 49px);
    overflow-y: auto;
    padding: 24px 16px;
    flex-shrink: 0;
    border-right: 1px solid #e5e7eb;
    background: #fff;
  }
  .toc-title {
    font-size: 13px; font-weight: 600; color: #999;
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .toc ul { list-style: none; }
  .toc li { margin: 0; }
  .toc a {
    display: block;
    padding: 4px 8px;
    font-size: 13px;
    color: #555;
    text-decoration: none;
    border-radius: 4px;
    transition: all 0.15s;
    line-height: 1.5;
  }
  .toc a:hover { background: #f0f0ff; color: #6366f1; }
  .toc a.active { background: #ede9fe; color: #6366f1; font-weight: 500; }
  .toc .toc-h1 { padding-left: 8px; font-weight: 600; font-size: 13px; }
  .toc .toc-h2 { padding-left: 8px; }
  .toc .toc-h3 { padding-left: 24px; font-size: 12px; color: #888; }
  .toc .toc-h4 { padding-left: 40px; font-size: 12px; color: #aaa; }
  .toc .toc-toggle {
    display: inline-block;
    width: 16px;
    font-size: 10px;
    color: #aaa;
    cursor: pointer;
    text-align: center;
    flex-shrink: 0;
    transition: transform 0.2s;
    user-select: none;
  }
  .toc .toc-toggle.collapsed { transform: rotate(-90deg); }
  .toc .toc-link-row {
    display: flex;
    align-items: center;
  }
  .toc .toc-link-row a { flex: 1; }
  .toc .toc-children { overflow: hidden; transition: max-height 0.25s ease; }
  .toc .toc-children.collapsed { max-height: 0 !important; }
  /* 正文 */
  .article {
    flex: 1;
    min-width: 0;
    margin: 32px auto;
    padding: 40px 48px;
    max-width: 860px;
  }
  .article h1 { font-size: 26px; margin: 32px 0 16px; color: #1e1e2e; border-bottom: 2px solid #6366f1; padding-bottom: 8px; }
  .article h2 { font-size: 22px; margin: 28px 0 12px; color: #1e1e2e; }
  .article h3 { font-size: 18px; margin: 24px 0 10px; color: #333; }
  .article h4 { font-size: 16px; margin: 20px 0 8px; color: #444; }
  .article p { margin: 8px 0; font-size: 15px; }
  .article ul, .article ol { margin: 8px 0 8px 24px; font-size: 15px; }
  .article li { margin: 4px 0; }
  .article table { border-collapse: collapse; width: 100%; margin: 12px 0; font-size: 14px; }
  .article th, .article td { border: 1px solid #e5e7eb; padding: 8px 12px; text-align: left; }
  .article th { background: #f8f9fb; font-weight: 600; }
  .article code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  .article pre { background: #f8f9fb; padding: 16px; border-radius: 8px; overflow-x: auto; margin: 12px 0; }
  .article pre code { background: none; padding: 0; }
  .article blockquote { border-left: 3px solid #6366f1; padding: 8px 16px; margin: 12px 0; background: #f8f7ff; color: #555; }
  .article img { max-width: 100%; border-radius: 8px; margin: 12px 0; }
  .loading { text-align: center; padding: 60px; color: #aaa; font-size: 15px; }
  /* 移动端：目录隐藏 */
  @media (max-width: 768px) {
    .toc { display: none; }
    .article { padding: 20px 16px; margin: 16px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="../../index.html">&larr; 返回文档中心</a>
  <span style="color:#ddd">|</span>
  <span class="title">登录注册功能说明文档 V2.0</span>
</div>

<div class="layout">
  <nav class="toc" id="toc">
    <div class="toc-title">目录</div>
    <ul id="tocList"></ul>
  </nav>
  <div class="article" id="article">
    <div class="loading">加载中...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
fetch('Looply用户系统-登录注册功能说明文档-V2.0.md')
  .then(function(r) { return r.text(); })
  .then(function(md) {
    var article = document.getElementById('article');
    article.innerHTML = marked.parse(md);

    // 收集标题
    var headings = article.querySelectorAll('h1, h2, h3, h4');
    var items = [];
    headings.forEach(function(h, i) {
      var id = 'heading-' + i;
      h.id = id;
      items.push({ level: parseInt(h.tagName[1]), text: h.textContent, id: id, el: h });
    });

    // 构建树形结构
    function buildTree(items) {
      var root = { children: [], level: 0 };
      var stack = [root];
      items.forEach(function(item) {
        var node = { item: item, children: [] };
        while (stack.length > 1 && stack[stack.length - 1].level >= item.level) {
          stack.pop();
        }
        stack[stack.length - 1].children.push(node);
        node.level = item.level;
        stack.push(node);
      });
      return root.children;
    }

    // 渲染树形目录
    function renderTree(nodes) {
      var ul = document.createElement('ul');
      nodes.forEach(function(node) {
        var li = document.createElement('li');
        var row = document.createElement('div');
        row.className = 'toc-link-row';

        var hasChildren = node.children.length > 0;

        if (hasChildren) {
          var toggle = document.createElement('span');
          toggle.className = 'toc-toggle';
          toggle.textContent = '▼';
          row.appendChild(toggle);
        } else {
          var spacer = document.createElement('span');
          spacer.style.width = '16px';
          spacer.style.display = 'inline-block';
          spacer.style.flexShrink = '0';
          row.appendChild(spacer);
        }

        var a = document.createElement('a');
        a.className = 'toc-h' + node.item.level;
        a.href = '#' + node.item.id;
        a.textContent = node.item.text;
        a.setAttribute('data-index', node.item.id);
        row.appendChild(a);
        li.appendChild(row);

        if (hasChildren) {
          var childUl = renderTree(node.children);
          childUl.className = 'toc-children';
          li.appendChild(childUl);

          toggle.addEventListener('click', function(e) {
            e.stopPropagation();
            var isCollapsed = childUl.classList.contains('collapsed');
            if (isCollapsed) {
              childUl.classList.remove('collapsed');
              toggle.classList.remove('collapsed');
            } else {
              childUl.classList.add('collapsed');
              toggle.classList.add('collapsed');
            }
          });
        }

        ul.appendChild(li);
      });
      return ul;
    }

    var tree = buildTree(items);
    var tocList = document.getElementById('tocList');
    tocList.innerHTML = '';
    var rendered = renderTree(tree);
    while (rendered.firstChild) {
      tocList.appendChild(rendered.firstChild);
    }

    // 滚动高亮 + 自动展开当前节点的父级
    var allLinks = tocList.querySelectorAll('a');
    var headingEls = items.map(function(it) { return it.el; });

    function updateActive() {
      var scrollTop = window.scrollY + 80;
      var current = 0;
      headingEls.forEach(function(h, i) {
        if (h.offsetTop <= scrollTop) current = i;
      });
      allLinks.forEach(function(a, i) {
        a.classList.toggle('active', i === current);
      });
      // 确保当前高亮项的父级目录是展开的
      var activeLink = allLinks[current];
      if (activeLink) {
        var parent = activeLink.closest('.toc-children');
        while (parent) {
          parent.classList.remove('collapsed');
          var tog = parent.previousElementSibling;
          if (tog) {
            var togBtn = tog.querySelector('.toc-toggle');
            if (togBtn) togBtn.classList.remove('collapsed');
          }
          parent = parent.parentElement.closest('.toc-children');
        }
      }
    }
    window.addEventListener('scroll', updateActive);
    updateActive();

    // 点击目录平滑滚动
    allLinks.forEach(function(a) {
      a.addEventListener('click', function(e) {
        e.preventDefault();
        var target = document.getElementById(a.getAttribute('href').slice(1));
        if (target) {
          window.scrollTo({ top: target.offsetTop - 60, behavior: 'smooth' });
        }
      });
    });

    // 默认折叠 h3/h4 层级（只展开 h1/h2）
    tocList.querySelectorAll('.toc-children').forEach(function(ul) {
      var parentLink = ul.previousElementSibling;
      if (parentLink) {
        var a = parentLink.querySelector('a');
        if (a && (a.classList.contains('toc-h2') || a.classList.contains('toc-h3'))) {
          ul.classList.add('collapsed');
          var tog = parentLink.querySelector('.toc-toggle');
          if (tog) tog.classList.add('collapsed');
        }
      }
    });
  })
  .catch(function() {
    document.getElementById('article').innerHTML = '<div class="loading">文档加载失败，请刷新重试</div>';
  });
</script>

</body>
</html>
