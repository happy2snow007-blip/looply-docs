{from:'standard_sku',to:'spu',type:'N:1',label:'一个标品对应多个标品SKU',indirect:false},
{from:'standard_sku_attribute',to:'standard_sku',type:'N:1',label:'standard_sku_attribute -> standard_sku',indirect:false},
{from:'standard_sku_attribute',to:'attribute_def',type:'N:1',label:'standard_sku_attribute -> attribute_def',indirect:false},
{from:'standard_sku_image',to:'standard_sku',type:'N:1',label:'standard_sku_image -> standard_sku',indirect:false},
{from:'used_item',to:'standard_sku',type:'N:1',label:'一个标品SKU对应多件二手实物',indirect:false},
{from:'used_item',to:'warehouse',type:'N:1',label:'used_item -> warehouse',indirect:false},
{from:'item_condition',to:'used_item',type:'N:1',label:'item_condition -> used_item',indirect:false},
{from:'listing',to:'used_item',type:'N:1',label:'一件二手商品可挂多个渠道',indirect:false},
{from:'listing',to:'channel',type:'N:1',label:'listing -> channel',indirect:false}]
};
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#f8f9fc;min-height:100vh;display:flex;flex-direction:column}
.hd{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:12px 32px;display:flex;justify-content:center;align-items:center;flex-shrink:0;gap:24px}

.tg{display:flex;background:rgba(255,255,255,.12);border-radius:6px;overflow:hidden}

body.tech .card .cr .cm{display:block}

body.tech .card .cr{display:none}

body.md .lg{display:none}

.md-wrap pre{background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:20px;font-size:13px;line-height:1.8;font-family:'SF Mono','Menlo','Monaco',monospace;white-space:pre-wrap;max-width:1000px;margin:0 auto}
.md-wrap .md-actions{text-align:center;margin-bottom:12px}
.md-wrap .md-actions button{border:1px solid #ddd;background:#fff;padding:5px 16px;font-size:13px;border-radius:6px;cursor:pointer;font-family:inherit}

.lg{background:#fff;border-radius:8px;padding:6px 18px;box-shadow:0 1px 3px rgba(0,0,0,.05);border:1px solid #e8e8e8;flex-shrink:0;margin:0 auto 6px;max-width:1400px;width:calc(100% - 40px)}
.lw{display:flex;gap:16px;flex-wrap:wrap;align-items:center;justify-content:center}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:#666}

<body>
<div class="hd" id="header"></div>
<div class="wrap"><div class="cv" id="canvas"></div></div>
<div class="md-wrap" id="mdWrap"></div>
<div class="lg" id="legend"></div>
<script>
const {title,version,groups:GROUPS,layers:LAYERS,entities:ENTITIES,midTables:MID_TABLES,relations:RELATIONS}=ER_CONFIG;
const STORAGE_KEY='er_pos_product_v2';
let curPos={},curSizes={},curLayerBounds=[];

/* ========== 持久化 ========== */
function loadSaved(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||null;}catch(e){return null;}}
function savePos(){localStorage.setItem(STORAGE_KEY,JSON.stringify(curPos));}
function clearSaved(){localStorage.removeItem(STORAGE_KEY);}

/* ========== Header / Legend ========== */
function renderHeader(){
  const hd=document.getElementById('header');
  document.title=title;
  hd.innerHTML=`<h1>${title}</h1><div class="hr"><div class="tg"><button class="on" onclick="sw('p',this)">产品视图</button><button onclick="sw('m',this)">Markdown</button></div><button class="btn-reset" onclick="resetLayout()" title="清除拖拽记录，恢复默认布局">重置布局</button><span>${version}</span></div>`;
}
function renderLegend(){
  const lg=document.getElementById('legend');
  let h='<div class="lw">';
  LAYERS.forEach(l=>{h+=`<div class="li"><div class="ld" style="background:${l.color}"></div>${l.name} · ${l.note}</div>`;});
  const types=[...new Set(RELATIONS.map(r=>r.type))];
  types.forEach(t=>{h+=`<div class="li"><span style="background:#666;color:#fff;font-size:10px;padding:2px 8px;border-radius:6px;font-weight:600">${t}</span> ${t==='1:N'?'一对多':t==='1:1'?'一对一':t==='M:N'?'多对多':t}</div>`;});
  h+='<div class="li" style="color:#999;font-size:10px">拖拽卡片调整位置，自动保存</div>';
  h+='</div>';
  lg.innerHTML=h;
}

/* ========== 分层布局引擎 ========== */
const CARD_W=240,COL_GAP=32,ROW_GAP=28,LAYER_GAP=70,LAYER_HEADER=50,MARGIN=40;
function layeredLayout(realSizes){
  const positions={};let currentY=MARGIN;const layerBounds=[];
  LAYERS.forEach((layer,li)=>{
    const layerStartY=currentY;currentY+=LAYER_HEADER;
    let maxColH=0;
    layer.columns.forEach(col=>{let h=0;col.forEach(eid=>{if(realSizes[eid])h+=realSizes[eid].h+ROW_GAP;});if(h>0)h-=ROW_GAP;maxColH=Math.max(maxColH,h);});
    layer.columns.forEach((col,ci)=>{let y=currentY;col.forEach(eid=>{if(!realSizes[eid])return;positions[eid]={x:MARGIN+ci*(CARD_W+COL_GAP),y};y+=realSizes[eid].h+ROW_GAP;});});
    const layerEndY=currentY+maxColH;
    layerBounds.push({startY:layerStartY,endY:layerEndY,layer});
    currentY=layerEndY+LAYER_GAP;
  });
  return {positions,layerBounds};
}

/* ========== 连线引擎 ========== */
function getBestSide(pos,size,tPos,tSize){
  const cx=pos.x+size.w/2,cy=pos.y+size.h/2,tx=tPos.x+tSize.w/2,ty=tPos.y+tSize.h/2;
  const dx=tx-cx,dy=ty-cy;
  if(Math.abs(dx)*size.h>Math.abs(dy)*size.w)return dx>0?'right':'left';
  return dy>0?'bottom':'top';
}
function getAnchor(pos,size,side){
  switch(side){
    case 'top':return{x:pos.x+size.w/2,y:pos.y};
    case 'bottom':return{x:pos.x+size.w/2,y:pos.y+size.h};
    case 'left':return{x:pos.x,y:pos.y+size.h/2};
    case 'right':return{x:pos.x+size.w,y:pos.y+size.h/2};
  }
}
function calcCanvasSize(){
  let maxX=0,maxY=0;
  Object.keys(curPos).forEach(id=>{const p=curPos[id],s=curSizes[id]||{w:CARD_W,h:60};maxX=Math.max(maxX,p.x+s.w+MARGIN);maxY=Math.max(maxY,p.y+s.h+MARGIN);});
  return{maxX,maxY};
}

/* ========== 构建 HTML 片段 ========== */
function buildCardHtml(e,p,s){
  const ec=e.entityColor||GROUPS[e.group]?.color||'#546E7A';
  const borderC=GROUPS[e.group]?.border||'#ddd';
  let h=`<div class="card" data-id="${e.id}" style="left:${p.x}px;top:${p.y}px;width:${s.w}px;border-color:${borderC}">`;
  h+=`<div class="ct" style="background:${ec}">${e.name}</div><div class="cb">`;
  e.fields.forEach(f=>{if(f.tech)return;h+=`<div class="cr"><span>${f.n}</span>${f.t?`<span class="cm">${f.t}</span>`:''}</div>`;});
  const hasCols=e.fields.some(f=>f.col);
  if(hasCols){
    h+='<div class="ctb"><table><tr><th>列名</th><th>类型</th><th>约束</th><th>说明</th></tr>';
    e.fields.forEach(f=>{if(f.col)h+=`<tr><td class="col-name">${f.col}</td><td>${f.t||''}</td><td>${f.constraint||''}</td><td>${f.desc||f.n}</td></tr>`;});
    h+='</table></div>';
  }
  if(e.techNote)h+=`<div class="ctn">${e.techNote}</div>`;
  h+='</div></div>';
  return h;
}
function buildOverlayHtml(maxX,maxY){
  let h='';
  // Layer backgrounds
  curLayerBounds.forEach(lb=>{
    const l=lb.layer;
    h+=`<div class="layer-bar" style="left:${MARGIN-16}px;top:${lb.startY}px;width:${maxX-MARGIN*2+32}px;height:${lb.endY-lb.startY+16}px;background:${l.color}"></div>`;
    h+=`<div class="layer-label" style="left:${MARGIN-10}px;top:${lb.startY+6}px;background:${l.color}">${l.name}</div>`;
    h+=`<div class="layer-note" style="left:${MARGIN+140}px;top:${lb.startY+8}px">${l.note}</div>`;
  });
  // SVG lines
  h+=`<svg class="lines" viewBox="0 0 ${maxX} ${maxY}">`;
  h+='<defs><marker id="arr" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="7" markerHeight="5" orient="auto-start-reverse"><path d="M0,0 L10,3 L0,6Z" fill="#aaa"/></marker></defs>';
  const labels=[];
  RELATIONS.forEach(rel=>{
    const fp=curPos[rel.from],tp=curPos[rel.to],fs=curSizes[rel.from],ts=curSizes[rel.to];
    if(!fp||!tp||!fs||!ts)return;
    const fSide=getBestSide(fp,fs,tp,ts),tSide=getBestSide(tp,ts,fp,fs);
    const a=getAnchor(fp,fs,fSide),b=getAnchor(tp,ts,tSide);
    const dash=rel.indirect?' stroke-dasharray="5,3"':'';
    h+=`<path d="M${a.x},${a.y} L${b.x},${b.y}" stroke="#bbb" stroke-width="1.2" fill="none"${dash} marker-end="url(#arr)"/>`;
    labels.push({x:(a.x+b.x)/2,y:(a.y+b.y)/2,type:rel.type});
  });
  h+='</svg>';
  labels.forEach(l=>{h+=`<div class="rl" style="left:${l.x-16}px;top:${l.y-9}px"><span style="background:#888">${l.type}</span></div>`;});
  return h;
}

/* ========== 拖拽时重绘连线 ========== */
function redrawOverlay(){
  const canvas=document.getElementById('canvas');
  const {maxX,maxY}=calcCanvasSize();
  canvas.style.width=maxX+'px';canvas.style.height=maxY+'px';
  canvas.querySelectorAll('.lines,.rl,.layer-bar,.layer-label,.layer-note').forEach(el=>el.remove());
  canvas.insertAdjacentHTML('afterbegin',buildOverlayHtml(maxX,maxY));
}

/* ========== 主渲染 ========== */
function render(){
  const canvas=document.getElementById('canvas');
  // Step 1: measure heights
  let tmp='';
  ENTITIES.forEach(e=>{
    const ec=e.entityColor||GROUPS[e.group]?.color||'#546E7A';
    tmp+=`<div class="card" data-id="${e.id}" style="left:0;top:0;width:${CARD_W}px;visibility:hidden">`;
    tmp+=`<div class="ct" style="background:${ec}">${e.name}</div><div class="cb">`;
    e.fields.forEach(f=>{if(!f.tech)tmp+=`<div class="cr"><span>${f.n}</span></div>`;});
    if(e.techNote)tmp+=`<div class="ctn">${e.techNote}</div>`;
    tmp+='</div></div>';
  });
  canvas.innerHTML=tmp;
  const realSizes={};
  ENTITIES.forEach(e=>{const el=canvas.querySelector(`[data-id="${e.id}"]`);realSizes[e.id]={w:CARD_W,h:el?el.offsetHeight:80};});
  curSizes=realSizes;

  // Step 2: auto layout
  const {positions,layerBounds}=layeredLayout(realSizes);
  curLayerBounds=layerBounds;

  // Step 3: merge saved positions
  const saved=loadSaved();
  if(saved){Object.keys(positions).forEach(id=>{curPos[id]=saved[id]||positions[id];});}
  else{curPos={...positions};}

  // Step 4: render
  const {maxX,maxY}=calcCanvasSize();
  canvas.style.width=maxX+'px';canvas.style.height=maxY+'px';
  let html=buildOverlayHtml(maxX,maxY);
  ENTITIES.forEach(e=>{const p=curPos[e.id];if(!p)return;html+=buildCardHtml(e,p,curSizes[e.id]);});
  canvas.innerHTML=html;
  initDrag();
  fitToScreen();
}

/* ========== 拖拽引擎 ========== */
function initDrag(){
  document.getElementById('canvas').querySelectorAll('.card[data-id]').forEach(card=>{
    card.addEventListener('pointerdown',onDragStart);
  });
}
let dragState=null;
function getCanvasScale(){
  const t=getComputedStyle(document.getElementById('canvas')).transform;
  if(t&&t!=='none'){const m=t.match(/matrix\(([^,]+)/);if(m)return parseFloat(m[1]);}
  return 1;
}
function onDragStart(e){
  if(e.button!==0)return;
  const card=e.currentTarget,id=card.dataset.id;
  if(!id||!curPos[id])return;
  card.classList.add('dragging');
  card.setPointerCapture(e.pointerId);
  dragState={id,card,startX:e.clientX,startY:e.clientY,origX:curPos[id].x,origY:curPos[id].y,scale:getCanvasScale()};
  card.addEventListener('pointermove',onDragMove);
  card.addEventListener('pointerup',onDragEnd);
  e.preventDefault();
}
function onDragMove(e){
  if(!dragState)return;
  const dx=(e.clientX-dragState.startX)/dragState.scale;
  const dy=(e.clientY-dragState.startY)/dragState.scale;
  curPos[dragState.id]={x:Math.max(0,dragState.origX+dx),y:Math.max(0,dragState.origY+dy)};
  dragState.card.style.left=curPos[dragState.id].x+'px';
  dragState.card.style.top=curPos[dragState.id].y+'px';
  redrawOverlay();
}
function onDragEnd(e){
  if(!dragState)return;
  dragState.card.classList.remove('dragging');
  dragState.card.removeEventListener('pointermove',onDragMove);
  dragState.card.removeEventListener('pointerup',onDragEnd);
  dragState=null;
  savePos();
}

function resetLayout(){clearSaved();curPos={};render();}

function fitToScreen(){
  const canvas=document.getElementById('canvas');
  const legendH=document.querySelector('.lg')?.offsetHeight||0;
  const headerH=document.querySelector('.hd')?.offsetHeight||0;
  const availW=window.innerWidth-20,availH=window.innerHeight-headerH-legendH-20;
  const cw=canvas.offsetWidth,ch=canvas.offsetHeight;
  if(cw<=0||ch<=0)return;
  const scale=Math.max(Math.min(availW/cw,availH/ch,1),0.35);
  if(scale<1){canvas.style.transform=`scale(${scale})`;canvas.style.marginBottom=-(ch*(1-scale))+'px';}
  else{canvas.style.transform='';canvas.style.marginBottom='';}
}
window.addEventListener('resize',fitToScreen);

function sw(m,el){
  document.body.className=m==='t'?'tech':m==='m'?'md':'';
  document.querySelectorAll('.tg button').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  if(m==='m')renderMarkdown();else render();
}

function renderMarkdown(){
  const mdWrap=document.getElementById('mdWrap');
  let md=`# ${title}\n\n${version}\n\n`;
  Object.keys(GROUPS).forEach(gk=>{
    const gi=GROUPS[gk],ents=ENTITIES.filter(e=>e.group===gk);
    if(!ents.length)return;
    md+=`## ${gi.label}\n\n`;
    ents.forEach(e=>{
      md+=`### ${e.name} \`${e.table}\`\n\n| 列名 | 类型 | 约束 | 说明 |\n|------|------|------|------|\n`;
      e.fields.forEach(f=>{if(f.col)md+=`| ${f.col} | ${f.t||''} | ${f.constraint||''} | ${f.desc||f.n} |\n`;});
      if(e.techNote)md+=`\n> ${e.techNote}\n`;
      md+='\n';
    });
  });
  md+='## 关系\n\n| 从 | 到 | 类型 | 说明 |\n|----|-----|------|------|\n';
  RELATIONS.forEach(r=>{
    const fn=ENTITIES.find(e=>e.id===r.from)?.name||r.from;
    const tn=ENTITIES.find(e=>e.id===r.to)?.name||r.to;
    md+=`| ${fn} | ${tn} | ${r.type} | ${r.label} |\n`;
  });
  mdWrap.innerHTML=`<div class="md-actions"><button onclick="copyMd()">复制 Markdown</button></div><pre id="mdContent">${md.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>`;
}
function copyMd(){
  const pre=document.getElementById('mdContent');
  navigator.clipboard.writeText(pre.textContent).then(()=>{
    const btn=document.querySelector('.md-actions button');
    btn.textContent='已复制';setTimeout(()=>btn.textContent='复制 Markdown',1500);
  });
}

renderHeader();renderLegend();render();
</script>
