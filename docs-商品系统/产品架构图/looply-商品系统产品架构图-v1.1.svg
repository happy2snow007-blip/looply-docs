<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1114">
<!-- STRUCTURED DATA
module: 商品系统
version: v1.1
title: looply 商品系统产品架构图 v1.1
scope: 商品系统负责商品信息的采集、组织、管理、渠道分发与定价、对外数据供给，不负责库存管理、质检执行、交易履约、营销活动
layers:
  - name: 用户层
    type: user
    - group: C端
      - 商品搜索与筛选
      - 商品详情
      - 商品列表
    - group: 商家端
      - 商品发布与编辑
      - 商品数据查看
      - 批量操作
    - group: 运营端
      - 商品审核
      - 上下架管控
  - name: 商品销售层
    type: core
    - group: 渠道管理
      - 线上商城
      - 线下门店
      - 三方平台(亚马逊等)
    - group: 选货管理
      - 选货规则配置
      - 自动/人工选货
    - group: 渠道商品控制
      - 按国家/渠道上下架
      - 按国家/渠道可见
      - 售出全渠道自动下架
    - group: 渠道定价
      - 渠道加价/折扣规则
      - 渠道价格覆盖
      - 国家币种定价
  - name: 商品实物层
    type: core
    - group: 商品信息
      - 关联标品SKU
      - 一物一码单品(数量=1)
      - 深库存商品(数量≥1)
      - 商家定价与图片
    - group: 商品发布与状态
      - 商品发布/编辑流程
      - 审核机制
      - 上架/下架控制
      - 商品状态流转
    - group: 二手质检信息
      - 质检报告模板
      - 质检报告
  - name: 标准数据层
    type: core
    - group: 基础数据
      - 品类管理
      - 品牌管理
      - 系列管理
    - group: 属性体系
      - 属性模板管理
      - 关键属性定义
      - 销售属性定义
      - 描述属性定义
    - group: 标品(SPU)管理
      - SPU创建与维护
      - 标品参数维护
      - 标品图片库
    - group: 标品SKU
      - 销售属性组合→SKU矩阵
      - 标品规格参数
      - 官方参考价/条形码
    - group: 数据接入
      - 人工录入
      - 外部数据导入
      - 数据清洗与去重
  - name: 外围系统
    type: infra
    internal: [库存系统, 质检系统]
    external: [图片/视频存储服务, 翻译服务, 汇率服务]
-->
<defs>
  <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
    <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000" flood-opacity="0.06"/>
  </filter>
</defs>
