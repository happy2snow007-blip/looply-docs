<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
.page { display: none; }
.page.active { display: block; }
.menu-solo { cursor: pointer; padding: 10px; background: #f0f0f0; margin: 5px; }
.menu-solo.active { background: #7C3AED; color: white; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="menu-solo" data-page="qc-template" role="button" tabindex="0">
    <span>质检模板管理</span>
  </div>
  <div class="menu-solo" data-page="test" role="button" tabindex="0">
    <span>测试页面</span>
  </div>
</div>

<div class="main">
  <div class="page" id="page-qc-template-list">
    <h1>质检模板列表页</h1>
    <p>这是质检模板列表页的内容</p>
  </div>

  <div class="page" id="page-test-list">
    <h1>测试页面</h1>
    <p>这是测试页面的内容</p>
  </div>
</div>

<script>
function clearAllActive() {
  document.querySelectorAll('.menu-solo, .page').forEach(function(el) {
    el.classList.remove('active');
  });
}

function navigateTo(pageId, label) {
  console.log('navigateTo called:', pageId, label);
  clearAllActive();
  var listPage = document.getElementById('page-' + pageId + '-list');
  console.log('Looking for:', 'page-' + pageId + '-list');
  console.log('Found:', listPage);
  if (listPage) {
    listPage.classList.add('active');
    console.log('Activated list page');
  } else {
    var pg = document.getElementById('page-' + pageId);
    console.log('Looking for fallback:', 'page-' + pageId);
    console.log('Found:', pg);
    if (pg) {
      pg.classList.add('active');
      console.log('Activated fallback page');
    }
  }
}

// 绑定菜单点击
document.querySelectorAll('.menu-solo').forEach(function(el) {
  el.addEventListener('click', function() {
    console.log('Menu clicked:', el.dataset.page);
    navigateTo(el.dataset.page, el.textContent.trim());
    el.classList.add('active');
  });
});

console.log('Script loaded');
console.log('All pages:', document.querySelectorAll('.page'));
console.log('QC template page:', document.getElementById('page-qc-template-list'));
</script>

</body>
</html>
